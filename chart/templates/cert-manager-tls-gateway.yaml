{{- if and .Values.gateway.enabled .Values.gateway.tls.certManager.enabled -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "srm.fullname" . }}-gateway-tls
  namespace: {{ if .Values.gateway.external.enabled }}{{ .Values.gateway.external.namespace }}{{ else }}{{ .Release.Namespace }}{{ end }}
spec:
  secretName: {{ .Values.gateway.tls.secretName }}
  duration: {{ .Values.gateway.tls.certManager.duration | quote }}
  renewBefore: {{ .Values.gateway.tls.certManager.renewBefore | quote }}
  commonName: {{ .Values.gateway.hostname }}
  dnsNames:
    - {{ .Values.gateway.hostname }}
  issuerRef:
    kind: {{ .Values.gateway.tls.certManager.issuerRef.kind }}
    name: {{ .Values.gateway.tls.certManager.issuerRef.name }}
{{- end -}}
