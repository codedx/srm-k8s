{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "srm.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ if .Values.gateway.external.enabled }}{{ .Values.gateway.external.name }}{{ else }}{{ include "srm.fullname" . }}{{ end }}
      namespace: {{ if .Values.gateway.external.enabled }}{{ .Values.gateway.external.namespace }}{{ else }}{{ .Release.Namespace }}{{ end }}
      {{- if and .Values.gateway.external.enabled .Values.gateway.external.sectionName }}
      sectionName: {{ .Values.gateway.external.sectionName }}
      {{- end }}
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "srm-web.fullname" . }}
          port: {{ .Values.web.service.port }}
    {{- if .Values.features.scanfarm }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/cache/
      backendRefs:
        - name: {{ include "srm.fullname" . }}-cache-service
          port: 8443
    - matches:
        - path:
            type: PathPrefix
            value: /api/v2/scans
      backendRefs:
        - name: {{ include "srm.fullname" . }}-scan-service
          port: 9998
    - matches:
        - path:
            type: PathPrefix
            value: /api/v2/storage
      backendRefs:
        - name: {{ include "srm.fullname" . }}-storage-service
          port: 9998
    {{- end }}
{{- end }}